name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps for headless Qt
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Byte-compile
        run: python -m compileall main.py hashi tools
      - name: Lint (ruff)
        run: ruff check . || true   # 参考。落とさない
      - name: Tests (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest
