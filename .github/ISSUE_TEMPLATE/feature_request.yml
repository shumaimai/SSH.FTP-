name: 機能要望
description: 新機能・改善の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 困っていること / やりたいこと
      description: 「〜ができなくて不便」の形で書いてもらえると判断しやすいです。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策(あれば)
  - type: textarea
    id: alternatives
    attributes:
      label: 代替手段・今のワークアラウンド(あれば)
